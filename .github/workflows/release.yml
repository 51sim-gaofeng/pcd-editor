name: Build & Release

# Trigger: push a version tag like v0.1.2
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write   # required to create/upload GitHub Releases
    strategy:
      fail-fast: false   # don't cancel the other platform if one fails
      matrix:
        include:
          - os: windows-latest
            bin_name: pcd_viewer.exe
            platform: windows-x64
          - os: ubuntu-22.04
            bin_name: pcd_viewer
            platform: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true   # download Git LFS files (sample/*.pcd)

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux: tkinter (file-picker) + upx + webkit2gtk 4.0 (pywebview)
      # Build on ubuntu-20.04 (glibc 2.31) so the binary runs on Ubuntu 20.04/22.04/24.04
      - name: Install system deps (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk upx-ucl \
            libwebkit2gtk-4.0-dev libgtk-3-dev gir1.2-webkit2-4.0

      # pip numpy has no MKL dependency — keeps binary small (~20 MB)
      - name: Install Python dependencies
        run: pip install numpy pyinstaller pywebview pillow

      - name: Generate app icon
        run: python assets/generate_icon.py

      - name: Build binary
        run: python -m PyInstaller pcd_viewer.spec --clean --noconfirm

      - name: Show binary size (Windows)
        if: runner.os == 'Windows'
        run: |
          $mb = (Get-Item dist\pcd_viewer.exe).Length / 1MB
          Write-Host "binary size: $([math]::Round($mb,1)) MB"

      - name: Show binary size (Linux)
        if: runner.os == 'Linux'
        run: du -sh dist/pcd_viewer

      - name: Smoke test
        run: python test_smoke.py --exe

      # ── Windows packaging ──────────────────────────────────────────────────
      - name: Package binary-only zip (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist\pcd_viewer.exe `
            -DestinationPath dist\pcd_viewer-${{ github.ref_name }}-${{ matrix.platform }}.zip

      - name: Package binary + samples zip (Windows)
        if: runner.os == 'Windows'
        run: |
          # staging\ contains: pcd_viewer.exe  +  sample\*.pcd
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item dist\pcd_viewer.exe staging\
          Copy-Item -Recurse sample staging\sample
          Compress-Archive -Path staging\* `
            -DestinationPath dist\pcd_viewer-${{ github.ref_name }}-${{ matrix.platform }}-with-samples.zip
          Remove-Item -Recurse -Force staging

      # ── Linux packaging ────────────────────────────────────────────────────
      - name: Package binary-only zip (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          zip pcd_viewer-${{ github.ref_name }}-${{ matrix.platform }}.zip pcd_viewer

      - name: Package binary + samples zip (Linux)
        if: runner.os == 'Linux'
        run: |
          # staging/ contains: pcd_viewer  +  sample/*.pcd
          mkdir -p staging/sample
          cp dist/pcd_viewer staging/
          cp sample/*.pcd staging/sample/
          cd staging
          zip -r ../dist/pcd_viewer-${{ github.ref_name }}-${{ matrix.platform }}-with-samples.zip .
          cd ..
          rm -rf staging

      # ── Build .deb package (Linux only) ───────────────────────────────────
      - name: Build .deb package (Linux)
        if: runner.os == 'Linux'
        run: |
          PKG=pcd-viewer
          VER=${{ github.ref_name }}
          VER=${VER#v}          # strip leading 'v'
          ARCH=amd64
          DEB_ROOT=deb_build

          # Standard Debian directory layout
          install -d  ${DEB_ROOT}/DEBIAN
          install -d  ${DEB_ROOT}/usr/local/bin
          install -d  ${DEB_ROOT}/usr/share/applications
          install -d  ${DEB_ROOT}/usr/share/pixmaps
          install -d  ${DEB_ROOT}/usr/share/doc/${PKG}

          # Binary
          install -m 755 dist/pcd_viewer ${DEB_ROOT}/usr/local/bin/pcd-viewer

          # App icon
          install -m 644 assets/icon.png ${DEB_ROOT}/usr/share/pixmaps/pcd-viewer.png

          # control file (runtime deps: libwebkit2gtk-4.0-37 on 22.04, 4.1-0 on 24.04)
          cat > ${DEB_ROOT}/DEBIAN/control << 'CTRL'
Package: pcd-viewer
Version: VER_PLACEHOLDER
Architecture: amd64
Maintainer: 51sim-gaofeng
Depends: libgtk-3-0, libwebkit2gtk-4.0-37 | libwebkit2gtk-4.1-0
Section: utils
Priority: optional
Description: 4DGS Lidar PCD Viewer
 Web-based point cloud visualizer using Three.js.
 Supports .pcd files with height/intensity coloring,
 lasso selection, trajectory editing, and pywebview native window.
CTRL
          sed -i "s/VER_PLACEHOLDER/${VER}/" ${DEB_ROOT}/DEBIAN/control

          # postinst: auto-install runtime deps when using dpkg -i
          cat > ${DEB_ROOT}/DEBIAN/postinst << 'POSTINST'
#!/bin/sh
set -e
case "$1" in
  configure)
    if command -v apt-get > /dev/null 2>&1; then
      apt-get install -y --no-install-recommends \
        libgtk-3-0 libwebkit2gtk-4.0-37 2>/dev/null || \
      apt-get install -y --no-install-recommends \
        libgtk-3-0 libwebkit2gtk-4.1-0 2>/dev/null || true
    fi
    ;;
esac
exit 0
POSTINST
          chmod 755 ${DEB_ROOT}/DEBIAN/postinst

          # .desktop launcher
          cat > ${DEB_ROOT}/usr/share/applications/pcd-viewer.desktop << 'DESK'
[Desktop Entry]
Name=PCD Viewer
Comment=4DGS Lidar Point Cloud Viewer
Exec=/usr/local/bin/pcd-viewer
Icon=pcd-viewer
Terminal=false
Type=Application
Categories=Science;Engineering;
DESK

          # copyright
          cat > ${DEB_ROOT}/usr/share/doc/${PKG}/copyright << 'CPR'
Format: https://www.debian.org/doc/packaging-manuals/copyright-format/1.0/
Upstream-Name: pcd-viewer
License: MIT
CPR

          dpkg-deb --build --root-owner-group ${DEB_ROOT} \
            dist/${PKG}_${VER}_${ARCH}.deb

          echo "DEB_FILE=${PKG}_${VER}_${ARCH}.deb" >> $GITHUB_ENV

      # ── Upload to Release (both platforms write to the same release) ───────
      - name: Upload to GitHub Release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          generate_release_notes: false
          files: |
            dist/pcd_viewer-${{ github.ref_name }}-${{ matrix.platform }}.zip
            dist/pcd_viewer-${{ github.ref_name }}-${{ matrix.platform }}-with-samples.zip

      - name: Upload to GitHub Release (Linux)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          generate_release_notes: false
          files: |
            dist/pcd_viewer-${{ github.ref_name }}-${{ matrix.platform }}.zip
            dist/pcd_viewer-${{ github.ref_name }}-${{ matrix.platform }}-with-samples.zip
            dist/${{ env.DEB_FILE }}
